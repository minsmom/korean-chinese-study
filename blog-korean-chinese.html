<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>한국인이 자주 틀리는 중국어</title><meta name="description" content="한국인이 헷갈리는 중국어 표현 정리"></head><body><h1>한국인이 자주 틀리는 중국어 표현</h1><p>중국어 학습 초기에 자주 실수하는 표현들을 정리했습니다.</p><h2>你好 와 您好 차이</h2><p>您好는 존칭 표현으로 공식적인 자리에서 많이 사용됩니다.</p><h2>谢谢 와 谢谢你</h2><p>둘 다 감사 표현이지만 상황에 따라 사용 방식이 달라집니다.</p></body></html>
